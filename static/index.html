<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telxius - Generador Carga Salesforce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
        }

        .container {
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 44px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8ecf0;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 170px;
            height: auto;
        }

        h1 {
            color: #0094A1;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #7a8a99;
            font-size: 0.85rem;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed #c8d5e0;
            border-radius: 14px;
            padding: 44px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafb;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #0094A1;
            background: #eef8f9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 148, 161, 0.1);
        }

        .upload-area.has-file {
            border-color: #0094A1;
            background: #eef8f9;
            border-style: solid;
        }

        .upload-icon {
            margin-bottom: 14px;
        }

        .upload-text {
            color: #8899a8;
            font-size: 0.9rem;
        }

        .file-name {
            color: #0094A1;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .file-info {
            color: #a0b0bc;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        input[type="file"] { display: none; }

        .btn {
            background: #0094A1;
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(0, 148, 161, 0.25);
        }

        .btn:hover {
            background: #00a8b8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 148, 161, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #c8d5e0;
            color: #fff;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .status {
            margin-top: 18px;
            font-size: 0.85rem;
            min-height: 24px;
            font-weight: 500;
        }

        .status.error {
            color: #e54d4d;
            animation: shake 0.4s ease;
        }

        .status.success {
            color: #0094A1;
            animation: popIn 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2.5px solid #d8e2ea;
            border-top-color: #0094A1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .processing-status {
            color: #7a8a99;
        }

        .divider {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e8ecf0;
        }

        .footer-logo {
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .footer-logo:hover {
            opacity: 0.5;
        }
    </style>
</head>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const fileInfo = document.getElementById('fileInfo');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) setFile(fileInput.files[0]); });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function setFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.textContent = formatSize(file.size);
            dropZone.classList.add('has-file');
            processBtn.disabled = false;
            status.textContent = '';
            status.className = 'status';
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            processBtn.disabled = true;
            status.className = 'status processing-status';
            status.innerHTML = '<span class="spinner"></span> Procesando...';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const resp = await fetch('/process', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('Error en el servidor');

                const contentType = resp.headers.get('content-type');
                if (contentType && contentType.includes('json')) {
                    const json = await resp.json();
                    throw new Error(json.error || 'Error desconocido');
                }

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'carga_salesforce_output.xlsx';
                a.click();
                URL.revokeObjectURL(url);

                status.className = 'status success';
                status.innerHTML = '&#10003; Archivo generado y descargado correctamente';
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Error: ' + err.message;
            } finally {
                processBtn.disabled = false;
            }
        });
    </script>
</body>
